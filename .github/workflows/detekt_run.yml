name: detekt

on: [push, pull_request]
     
jobs:
  detekt:
    runs-on: ubuntu-latest
    
    steps:
      - name: "checkout"
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Run tests
        uses: SELENIDE_URL="${{ vars.SELENIDE_URL }}" ./gradlew clean test
